<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kroy Editor</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg:       var(--tg-theme-bg-color, #1c1c1e);
  --bg2:      var(--tg-theme-secondary-bg-color, #2c2c2e);
  --text:     var(--tg-theme-text-color, #ffffff);
  --hint:     var(--tg-theme-hint-color, #8e8e93);
  --btn:      var(--tg-theme-button-color, #0a84ff);
  --btn-text: var(--tg-theme-button-text-color, #ffffff);
  --red:      #ff453a;
  --blue:     #0a84ff;
  --green:    #30d158;
  --sep:      rgba(255,255,255,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 15px; min-height: 100vh; padding-bottom: 80px;
}

/* HEADER */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg); border-bottom: 1px solid var(--sep);
  display: flex; align-items: center; height: 52px; padding: 0 12px; gap: 8px;
}
.header-title { font-weight: 600; font-size: 16px; flex: 1; }
.tab-bar { display: flex; background: var(--bg2); border-radius: 10px; padding: 2px; gap: 2px; }
.tab {
  flex: 1; padding: 10px 10px; border: none; background: transparent;
  color: var(--hint); font-size: 15px; font-weight: 600; border-radius: 8px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.tab.active { background: var(--btn); color: var(--btn-text); }

/* SCREENS */
.screen { display: none; padding: 12px 0; }
.screen.active { display: block; }

/* SECTION LABEL */
.section-label {
  font-size: 12px; color: var(--hint);
  padding: 0 16px 6px; letter-spacing: 0.3px; text-transform: uppercase;
}

/* TIP SECTION */
.tip-section { margin: 0 12px 12px; background: var(--bg2); border-radius: 12px; overflow: hidden; }
.tip-row { display: flex; align-items: center; padding: 10px 14px; gap: 10px; border-bottom: 1px solid var(--sep); }
.tip-row:last-child { border-bottom: none; }
.tip-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.tip-dot.blue { background: var(--blue); }
.tip-dot.red  { background: var(--red); }
.tip-label { font-size: 13px; color: var(--hint); width: 46px; flex-shrink: 0; }
.tip-input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 15px; outline: none; min-width: 0; }
.tip-input::placeholder { color: var(--hint); }

/* DETAIL LIST */
.detail-list { margin: 0 12px; background: var(--bg2); border-radius: 12px; overflow: hidden; }
.detail-row {
  display: flex; align-items: center; padding: 0 14px; height: 52px;
  border-bottom: 1px solid var(--sep); gap: 10px; cursor: pointer;
}
.detail-row:last-child { border-bottom: none; }
.detail-row.editing { background: rgba(10,132,255,0.06); cursor: default; }
.detail-row.editing .detail-size-text { display: none; }
.detail-row:not(.editing) .detail-size-input { display: none; }
.detail-num { font-size: 13px; color: var(--hint); width: 22px; flex-shrink: 0; text-align: right; }
.detail-size { flex: 1; font-size: 15px; font-variant-numeric: tabular-nums; }
.detail-size-input { display: flex; align-items: center; gap: 4px; flex: 1; }
.size-field {
  width: 52px; background: var(--bg); border: 1.5px solid var(--btn);
  border-radius: 6px; color: var(--text); font-size: 14px;
  text-align: center; padding: 4px 2px; outline: none;
  transition: width 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  min-width: 52px;
}
.size-field.kb-active {
  width: 120px !important;
  border-color: var(--green) !important;
  background: rgba(48,209,88,0.12) !important;
  box-shadow: 0 0 0 2px rgba(48,209,88,0.25);
}
.size-sep { color: var(--hint); font-size: 13px; }
.detail-badges { display: flex; gap: 4px; flex-shrink: 0; }
.badge { font-size: 11px; font-weight: 600; padding: 2px 5px; border-radius: 5px; line-height: 1.4; }
.badge-blue  { background: rgba(10,132,255,0.18); color: var(--blue); }
.badge-red   { background: rgba(255,69,58,0.18); color: var(--red); }
.badge-empty { background: rgba(142,142,147,0.12); color: var(--hint); }
.row-actions { display: flex; gap: 6px; flex-shrink: 0; }
.btn-icon {
  width: 30px; height: 30px; border: none; border-radius: 8px;
  background: rgba(142,142,147,0.12); color: var(--hint);
  font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.btn-icon.danger { background: rgba(255,69,58,0.12); color: var(--red); }
.add-row-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  margin: 10px 12px 0; height: 46px; background: var(--bg2); border: none;
  border-radius: 12px; color: var(--btn); font-size: 15px; font-weight: 500;
  cursor: pointer; width: calc(100% - 24px);
}

/* KROMKA */
.krom-list { margin: 0 12px; background: var(--bg2); border-radius: 12px; overflow: hidden; }
.krom-row { padding: 10px 14px; border-bottom: 1px solid var(--sep); }
.krom-row:last-child { border-bottom: none; }
.krom-info { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.krom-num { font-size: 13px; color: var(--hint); width: 22px; text-align: right; }
.krom-size { font-size: 15px; font-variant-numeric: tabular-nums; }
.krom-btns { display: flex; gap: 6px; padding-left: 30px; }
.krom-btn {
  flex: 1; height: 34px; border: 1.5px solid var(--sep); border-radius: 8px;
  background: transparent; color: var(--hint); font-size: 13px; font-weight: 600; cursor: pointer;
}
.krom-btn.active-blue { background: rgba(10,132,255,0.15); border-color: var(--blue); color: var(--blue); }
.krom-btn.active-red  { background: rgba(255,69,58,0.15);  border-color: var(--red);  color: var(--red); }

/* KROY SCREEN */
.kroy-options { margin: 0 12px 12px; background: var(--bg2); border-radius: 12px; overflow: hidden; }
.kroy-option-row {
  display: flex; align-items: center; padding: 12px 14px;
  border-bottom: 1px solid var(--sep); gap: 10px; cursor: pointer;
}
.kroy-option-row:last-child { border-bottom: none; }
.kroy-toggle {
  width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--hint);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
}
.kroy-toggle.on { background: var(--btn); border-color: var(--btn); }
.kroy-toggle.on::after { content: '✓'; color: #fff; font-size: 12px; font-weight: 700; }
.kroy-option-label { font-size: 15px; flex: 1; }
.kroy-option-hint  { font-size: 13px; color: var(--hint); }

.sheet-sizes { display: flex; flex-wrap: wrap; gap: 8px; margin: 0 12px 12px; }
.size-btn {
  padding: 8px 14px; border: 1.5px solid var(--sep); border-radius: 10px;
  background: var(--bg2); color: var(--text); font-size: 14px; font-weight: 500; cursor: pointer;
}
.size-btn.active { border-color: var(--btn); color: var(--btn); background: rgba(10,132,255,0.1); }
.size-btn.universal { border-color: var(--green); color: var(--green); background: rgba(48,209,88,0.08); }

.custom-size-row {
  display: flex; align-items: center; gap: 8px;
  margin: 0 12px 12px; background: var(--bg2); border-radius: 12px; padding: 10px 14px;
}
.custom-size-row input {
  flex: 1; background: transparent; border: none; color: var(--text);
  font-size: 15px; outline: none; text-align: center;
}
.custom-size-row .size-sep { color: var(--hint); }

/* KROY RESULT */
.kroy-result { margin: 0 12px; }
.kroy-loading {
  text-align: center; padding: 40px 24px; color: var(--hint); font-size: 14px;
}
.kroy-mat-title {
  font-size: 14px; font-weight: 600; color: var(--hint);
  text-transform: uppercase; letter-spacing: 0.5px;
  padding: 12px 0 6px;
}
.kroy-sheet-card {
  background: var(--bg2); border-radius: 12px;
  margin-bottom: 10px; overflow: hidden;
}
.kroy-sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid var(--sep);
}
.kroy-sheet-num { font-size: 14px; font-weight: 600; }
.kroy-sheet-eff {
  font-size: 13px; font-weight: 600; padding: 3px 10px;
  border-radius: 20px; background: rgba(48,209,88,0.12); color: var(--green);
}
.kroy-sheet-eff.low { background: rgba(255,159,10,0.12); color: #ff9f0a; }
.kroy-svg-wrap { padding: 10px; overflow-x: auto; }
.kroy-svg-wrap svg { display: block; border-radius: 6px; }

.kroy-summary {
  background: var(--bg2); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px;
  display: flex; align-items: center; justify-content: space-between;
}
.kroy-summary-mat { font-size: 15px; font-weight: 600; }
.kroy-summary-info { font-size: 13px; color: var(--hint); text-align: right; }

.not-fit-box {
  background: rgba(255,69,58,0.08); border: 1px solid rgba(255,69,58,0.2);
  border-radius: 10px; padding: 10px 14px; margin-bottom: 10px;
}
.not-fit-title { font-size: 13px; color: var(--red); font-weight: 600; margin-bottom: 4px; }
.not-fit-item  { font-size: 13px; color: var(--hint); }

/* BOTTOM BAR */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--bg); border-top: 1px solid var(--sep);
  padding: 10px 12px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
  display: flex; gap: 8px;
}
.btn-main {
  flex: 1; height: 48px; border: none; border-radius: 12px;
  background: var(--btn); color: var(--btn-text); font-size: 16px; font-weight: 600; cursor: pointer;
}
.btn-main:active { opacity: 0.8; }
.btn-main:disabled { opacity: 0.4; }
.btn-secondary {
  height: 48px; padding: 0 18px; border: none; border-radius: 12px;
  background: var(--bg2); color: var(--text); font-size: 15px; font-weight: 500; cursor: pointer;
}

/* TOAST */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: rgba(50,50,52,0.95); color: #fff; padding: 9px 18px;
  border-radius: 20px; font-size: 14px; font-weight: 500;
  opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 999;
}
.toast.show { opacity: 1; }
.empty { text-align: center; padding: 40px 24px; color: var(--hint); font-size: 14px; line-height: 1.6; }

/* CUSTOM KEYBOARD */
.custom-kb {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 500;
  background: var(--bg2); border-top: 1px solid var(--sep);
  padding: 8px 8px calc(8px + env(safe-area-inset-bottom));
  transform: translateY(100%);
  transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
}
.custom-kb.visible { transform: translateY(0); }
.kb-field-tabs {
  display: flex; gap: 6px; margin-bottom: 6px;
}
.kb-tab {
  flex: 1; height: 34px; border-radius: 8px;
  background: var(--bg); color: var(--hint);
  font-size: 13px; font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s;
}
.kb-tab.active {
  background: var(--green); color: #000;
}
.kb-display {
  background: var(--bg); border-radius: 10px; padding: 8px 14px;
  margin-bottom: 8px; display: flex; align-items: center; gap: 8px;
}
.kb-display-label { font-size: 12px; color: var(--hint); min-width: 36px; }
.kb-display-val { flex: 1; font-size: 20px; font-weight: 600; font-variant-numeric: tabular-nums; letter-spacing: 1px; }
.kb-display-eval { font-size: 13px; color: var(--green); min-width: 60px; text-align: right; }
.kb-rows { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
.kb-btn {
  height: 52px; border: none; border-radius: 10px;
  background: var(--bg); color: var(--text);
  font-size: 20px; font-weight: 500; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.1s;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}
.kb-btn:active { opacity: 0.5; }
.kb-btn.op { color: var(--blue); font-size: 22px; }
.kb-btn.del { background: rgba(255,69,58,0.12); color: var(--red); font-size: 18px; }
.kb-btn.ok  { background: var(--btn); color: var(--btn-text); font-size: 16px; font-weight: 700; }
.kb-btn.next { background: rgba(10,132,255,0.12); color: var(--blue); font-size: 15px; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">✂️ Kroy Editor</div>
  <div class="tab-bar">
    <button class="tab active" id="tab-list" onclick="switchTab('list')">📋 Ro'yxat</button>
    <button class="tab" id="tab-krom" onclick="switchTab('krom')">🎨 Kromka</button>
    <button class="tab" id="tab-kroy" onclick="switchTab('kroy')">🪚 Kroy</button>
  </div>
</div>

<!-- SCREEN 1: LIST -->
<div class="screen active" id="screen-list">
  <div style="height:10px"></div>
  <div class="section-label">DETALLAR</div>
  <div class="detail-list" id="detail-list"></div>
  <button class="add-row-btn" onclick="addRow()">＋ Qator qo'shish</button>
</div>

<!-- SCREEN 2: KROMKA -->
<div class="screen" id="screen-krom">
  <div style="height:10px"></div>
  <div class="section-label">KROMKA TURLARI</div>
  <div class="tip-section">
    <div class="tip-row">
      <div class="tip-dot blue"></div>
      <div class="tip-label">Tip 1</div>
      <input class="tip-input" id="tip1" type="text" placeholder="masalan: 2mm PVC" autocomplete="off">
    </div>
    <div class="tip-row">
      <div class="tip-dot red"></div>
      <div class="tip-label">Tip 2</div>
      <input class="tip-input" id="tip2" type="text" placeholder="masalan: 0.4 o'zidan" autocomplete="off">
    </div>
  </div>
  <div style="height:12px"></div>
  <div class="section-label">TOMONLARNI BELGILANG</div>
  <div class="krom-list" id="krom-list"></div>
</div>

<!-- SCREEN 3: KROY -->
<div class="screen" id="screen-kroy">
  <div style="height:10px"></div>

  <!-- Sozlamalar -->
  <div class="section-label">SOZLAMALAR</div>
  <div class="kroy-options">
    <div class="kroy-option-row" onclick="toggleRotate()">
      <div class="kroy-toggle" id="rotate-toggle"></div>
      <div class="kroy-option-label">Tekstura yo'lini farqi</div>
      <div class="kroy-option-hint" id="rotate-hint">Farqi bor</div>
    </div>
  </div>

  <!-- List o'lchamlari -->
  <div class="section-label">LIST O'LCHAMI</div>
  <div class="sheet-sizes" id="sheet-sizes"></div>

  <!-- Boshqa o'lcham -->
  <div class="custom-size-row" id="custom-size-row" style="display:none">
    <input type="number" inputmode="numeric" id="custom-l" placeholder="Uzun" onchange="onCustomChange()">
    <span class="size-sep">×</span>
    <input type="number" inputmode="numeric" id="custom-w" placeholder="Keng" onchange="onCustomChange()">
  </div>

  <!-- Natija -->
  <div class="section-label" id="result-label" style="display:none">NATIJA</div>
  <div class="kroy-result" id="kroy-result"></div>
</div>

<!-- BOTTOM BAR -->
<div class="bottom-bar">
  <button class="btn-secondary" id="btn-left" onclick="onLeftBtn()">⬅️ Orqaga</button>
  <button class="btn-main" id="btn-right" onclick="onRightBtn()">🎨 Kromka →</button>
</div>

<!-- CUSTOM KEYBOARD -->
<div class="custom-kb" id="custom-kb">
  <div class="kb-field-tabs">
    <div class="kb-tab" id="kb-tab-0" onclick="kbSwitchField(0)">Uzun</div>
    <div class="kb-tab" id="kb-tab-1" onclick="kbSwitchField(1)">Keng</div>
    <div class="kb-tab" id="kb-tab-2" onclick="kbSwitchField(2)">Son</div>
  </div>
  <div class="kb-display">
    <div class="kb-display-val" id="kb-val">—</div>
    <div class="kb-display-eval" id="kb-eval"></div>
  </div>
  <div class="kb-rows">
    <button class="kb-btn op" ontouchstart="" onclick="kbTap('(')" >(</button>
    <button class="kb-btn op" ontouchstart="" onclick="kbTap(')')" >)</button>
    <button class="kb-btn op" ontouchstart="" onclick="kbTap('/')" >÷</button>
    <button class="kb-btn op" ontouchstart="" onclick="kbTap('*')" >×</button>
    <button class="kb-btn del" ontouchstart="" onclick="kbDel()">⌫</button>

    <button class="kb-btn" ontouchstart="" onclick="kbTap('7')">7</button>
    <button class="kb-btn" ontouchstart="" onclick="kbTap('8')">8</button>
    <button class="kb-btn" ontouchstart="" onclick="kbTap('9')">9</button>
    <button class="kb-btn op" ontouchstart="" onclick="kbTap('-')" style="grid-column:span 2">−</button>

    <button class="kb-btn" ontouchstart="" onclick="kbTap('4')">4</button>
    <button class="kb-btn" ontouchstart="" onclick="kbTap('5')">5</button>
    <button class="kb-btn" ontouchstart="" onclick="kbTap('6')">6</button>
    <button class="kb-btn op" ontouchstart="" onclick="kbTap('+')" style="grid-column:span 2">+</button>

    <button class="kb-btn" ontouchstart="" onclick="kbTap('1')">1</button>
    <button class="kb-btn" ontouchstart="" onclick="kbTap('2')">2</button>
    <button class="kb-btn" ontouchstart="" onclick="kbTap('3')">3</button>
    <button class="kb-btn next" ontouchstart="" onclick="kbNext()" id="kb-next-btn" style="grid-column:span 2">→</button>

    <button class="kb-btn" ontouchstart="" onclick="kbTap('0')" style="grid-column:span 2">0</button>
    <button class="kb-btn" ontouchstart="" onclick="kbTap('.')">.</button>
    <button class="kb-btn ok" ontouchstart="" onclick="kbOk()" style="grid-column:span 2">OK</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────────
const SERVER = "https://api.mebx.uz";  // serverga joylashganda o'zgartiring

// ── STATE ─────────────────────────────────────────────────────────────────────
let details = [];
let tip1 = "", tip2 = "";
let currentTab = "list";
let rotateAll = false;
let selectedSize = null;   // {l, w} yoki "universal"
let kroyLoading = false;
const tg = window.Telegram?.WebApp;

const SHEET_SIZES = [[2440,1220],[2500,1830],[2750,1830],[2800,2070]];

// ── INIT ──────────────────────────────────────────────────────────────────────
(function init() {
  if (tg) { tg.ready(); tg.expand(); }

  const params = new URLSearchParams(window.location.search);
  const raw = params.get("data");
  tip1 = decodeURIComponent(params.get("tip1") || "");
  tip2 = decodeURIComponent(params.get("tip2") || "");

  if (raw) {
    try {
      const parsed = JSON.parse(atob(raw));
      details = parsed.map(d => ({
        uzun: +d.uzun||0, keng: +d.keng||0, son: +d.son||1,
        uzun1: d.uzun1||"", uzun2: d.uzun2||"",
        keng1: d.keng1||"", keng2: d.keng2||"",
        txt:     d.txt !== undefined ? d.txt : true,
        naim:    d.naim||"",
        povorot: d.povorot||0,
      }));
    } catch(e) { details = []; }
  }

  document.getElementById("tip1").value = tip1;
  document.getElementById("tip2").value = tip2;
  document.getElementById("tip1").addEventListener("input", e => { tip1 = e.target.value; });
  document.getElementById("tip2").addEventListener("input", e => { tip2 = e.target.value; });

  renderList();
  renderKrom();
  renderSheetSizes();
})();

// ── TAB SWITCH ────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  closeAllEdits();
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById("tab-" + tab).classList.add("active");
  document.getElementById("screen-" + tab).classList.add("active");

  const L = document.getElementById("btn-left");
  const R = document.getElementById("btn-right");

  if (tab === "list") {
    L.textContent = "⬅️ Orqaga"; R.textContent = "🎨 Kromka →";
  } else if (tab === "krom") {
    L.textContent = "⬅️ Ro'yxat"; R.textContent = "🪚 Kroy →";
    // closeAllEdits ichida renderList chaqirilishi mumkin, shuning uchun kechiktirish
    setTimeout(() => renderKrom(), 0);
  } else if (tab === "kroy") {
    L.textContent = "⬅️ Kromka"; R.textContent = "✅ Tasdiqlash";
    setTimeout(() => renderKrom(), 0);
  }
}

function onLeftBtn() {
  if (currentTab === "krom") switchTab("list");
  else if (currentTab === "kroy") switchTab("krom");
  else tg?.close();
}

function onRightBtn() {
  if (currentTab === "list") {
    if (!details.length) { showToast("❌ Detallar bo'sh!"); return; }
    switchTab("krom");
  } else if (currentTab === "krom") {
    switchTab("kroy");
  } else {
    sendData();
  }
}

// ── MATH EVAL ─────────────────────────────────────────────────────────────────
function evalMath(val) {
  if (!val && val !== 0) return 0;
  const s = String(val).trim().replace(/,/g, '.');
  // Faqat raqamlar va matematik amallar bo'lsa hisoblaymiz
  if (/^[\d\s\+\-\*\/\.\(\)]+$/.test(s)) {
    try {
      const result = Function('"use strict"; return (' + s + ')')();
      if (isFinite(result) && result > 0) return Math.round(result);
    } catch(e) {}
  }
  const n = parseFloat(s);
  return isFinite(n) ? Math.round(n) : 0;
}

// ── RENDER LIST ───────────────────────────────────────────────────────────────
function renderList() {
  const c = document.getElementById("detail-list");
  if (!details.length) {
    c.innerHTML = '<div class="empty">Detallar yo\'q.<br>Qator qo\'shish tugmasini bosing.</div>';
    return;
  }
  c.innerHTML = details.map((d, i) => `
    <div class="detail-row" id="row-${i}" onclick="rowTap(event,${i})">
      <div class="detail-num">${i+1}</div>
      <div class="detail-size" style="flex:1;display:flex;align-items:center;gap:4px;flex-wrap:nowrap;">
        <div class="detail-size-text" style="white-space:nowrap">${d.uzun}×${d.keng}×${d.son}</div>
        <div class="detail-size-input" id="edit-${i}" style="display:none;align-items:center;gap:2px;">
          <input class="size-field" id="f-uzun-${i}" type="text" inputmode="none" readonly value="${d.uzun}" ontouchstart="event.preventDefault();kbOpen(${i},0)" onclick="kbOpen(${i},0)">
          <span class="size-sep">×</span>
          <input class="size-field" id="f-keng-${i}" type="text" inputmode="none" readonly value="${d.keng}" ontouchstart="event.preventDefault();kbOpen(${i},1)" onclick="kbOpen(${i},1)">
          <span class="size-sep">×</span>
          <input class="size-field" id="f-son-${i}" type="text" inputmode="none" readonly value="${d.son}" ontouchstart="event.preventDefault();kbOpen(${i},2)" onclick="kbOpen(${i},2)">
        </div>

        <div class="detail-name-text" style="flex:1;color:#ff3b30;font-size:15px;font-weight:600;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${d.naim||''}</div>
        <input class="detail-name-input size-field" id="f-naim-${i}" style="display:none;flex:1;min-width:80px;" type="text" placeholder="Nom..." value="${d.naim||''}">
      </div>
      <div class="detail-badges">${kromBadges(d)}</div>
      <div class="row-actions">
        <button class="btn-icon danger" onclick="event.stopPropagation();deleteRow(${i})">🗑</button>
      </div>
    </div>`).join("");
}

function kromBadges(d) {
  const has = d.uzun1||d.uzun2||d.keng1||d.keng2;
  if (!has) return '<span class="badge badge-empty">—</span>';
  let out = "";
  if (d.uzun1) out += `<span class="badge badge-${d.uzun1===tip2&&tip2?'red':'blue'}">U1</span>`;
  if (d.uzun2) out += `<span class="badge badge-${d.uzun2===tip2&&tip2?'red':'blue'}">U2</span>`;
  if (d.keng1) out += `<span class="badge badge-${d.keng1===tip2&&tip2?'red':'blue'}">K1</span>`;
  if (d.keng2) out += `<span class="badge badge-${d.keng2===tip2&&tip2?'red':'blue'}">K2</span>`;
  return out;
}

function rowTap(e, i) {
  if (e.target.tagName==="INPUT"||e.target.tagName==="BUTTON") return;
  if (document.getElementById("row-"+i)?.classList.contains("editing")) return;
  startEdit(i);
}

function startEdit(i) {
  closeAllEdits();
  const row = document.getElementById("row-"+i);
  if (!row) return;
  row.classList.add("editing");
  const editDiv = document.getElementById("edit-"+i);
  if (editDiv) editDiv.style.display = "flex";
  const sizeText = row.querySelector(".detail-size-text");
  if (sizeText) sizeText.style.display = "none";
  const naimInput = document.getElementById("f-naim-"+i);
  const naimText  = row.querySelector(".detail-name-text");
  if (naimInput) naimInput.style.display = "block";
  if (naimText)  naimText.style.display  = "none";

  if (naimInput) {
    naimInput.addEventListener("keydown", e => {
      if(e.key==="Enter") {
        e.preventDefault();
        saveEdit(i);
        setTimeout(() => {
          if (i + 1 < details.length) startEdit(i + 1);
          else addRow();
        }, 0);
      }
    });
    naimInput.addEventListener("blur", () => setTimeout(() => {
      const r = document.getElementById("row-"+i);
      if (r?.classList.contains("editing") && !r.contains(document.activeElement)) {
        if (!document.getElementById("custom-kb").classList.contains("visible")) saveEdit(i);
      }
    }, 150));
  }

  kbOpen(i, 0);
  setTimeout(() => row.scrollIntoView({behavior:"smooth", block:"center"}), 60);
}

function saveEdit(i) {
  const uzunEl = document.getElementById("f-uzun-"+i);
  const kengEl = document.getElementById("f-keng-"+i);
  const sonEl  = document.getElementById("f-son-"+i);
  const uzun = evalMath(uzunEl?.value);
  const keng = evalMath(kengEl?.value);
  const son  = evalMath(sonEl?.value) || 1;
  if (uzun<=0||keng<=0||son<=0) { showToast("❌ O'lchamlar noto'g'ri"); return; }
  const naim = document.getElementById("f-naim-"+i)?.value?.trim() || "";
  details[i].uzun=uzun; details[i].keng=keng; details[i].son=son; details[i].naim=naim;
  renderList();
}

function closeAllEdits() {
  kbClose();
  document.querySelectorAll(".detail-row.editing").forEach(row => {
    const i = parseInt(row.id.replace("row-",""));
    if (!isNaN(i)) saveEdit(i);
  });
}

function deleteRow(i) {
  const d = details[i];
  const msg = (i+1)+"-qatorni o'chirasizmi?\n"+d.uzun+"×"+d.keng+"×"+d.son;
  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.showPopup) {
    Telegram.WebApp.showPopup({
      title: "O'chirish",
      message: msg,
      buttons: [
        {id: "yes", type: "destructive", text: "O'chirish"},
        {id: "no",  type: "cancel",      text: "Bekor"},
      ]
    }, function(btn) {
      if (btn === "yes") { details.splice(i, 1); renderList(); showToast("🗑 Qator o'chirildi"); }
    });
  } else {d
    if (!confirm(msg)) return;
    details.splice(i, 1); renderList(); showToast("🗑 Qator o'chirildi");
}
}
function addRow() {
  details.push({uzun:0,keng:0,son:1,uzun1:"",uzun2:"",keng1:"",keng2:""});
  renderList();
  const idx = details.length-1;
  startEdit(idx);
  setTimeout(() => document.getElementById("row-"+idx)?.scrollIntoView({behavior:"smooth",block:"center"}), 60);
}

// ── RENDER KROMKA ─────────────────────────────────────────────────────────────
function renderKrom() {
  const c = document.getElementById("krom-list");
  if (!details.length) { c.innerHTML = '<div class="empty">Detallar yo\'q.</div>'; return; }
  c.innerHTML = details.map((d,i) => {
    const sides=["uzun1","uzun2","keng1","keng2"], labels=["U1","U2","K1","K2"];
    const btns = sides.map((s,si) => {
      const v=d[s]; let cls="krom-btn";
      if (v&&v===tip1) cls+=" active-blue";
      else if (v&&v===tip2&&tip2) cls+=" active-red";
      else if (v) cls+=" active-blue";
      return `<button class="${cls}" onclick="toggleKrom(${i},'${s}')">${labels[si]}</button>`;
    }).join("");
    return `<div class="krom-row">
      <div class="krom-info"><div class="krom-num">${i+1}</div><div class="krom-size">${d.uzun}×${d.keng}×${d.son}</div></div>
      <div class="krom-btns">${btns}</div></div>`;
  }).join("");
}

function toggleKrom(i, side) {
  tip1 = document.getElementById("tip1").value.trim();
  tip2 = document.getElementById("tip2").value.trim();
  const d=details[i], cur=d[side];
  if (!cur) d[side]=tip1||"Kromka1";
  else if (tip2 && cur!==(tip2||"Kromka2")) d[side]=tip2||"Kromka2";
  else d[side]="";
  renderKrom();
  const row=document.getElementById("row-"+i);
  if (row) { const bd=row.querySelector(".detail-badges"); if(bd) bd.innerHTML=kromBadges(d); }
}

// ── KROY TAB ──────────────────────────────────────────────────────────────────
function renderSheetSizes() {
  const c = document.getElementById("sheet-sizes");
  let html = SHEET_SIZES.map(([l,w]) =>
    `<button class="size-btn" id="sz-${l}-${w}" onclick="selectSize(${l},${w})">${l}×${w}</button>`
  ).join("");
  html += `<button class="size-btn" id="sz-custom" onclick="selectCustom()">✏️ Boshqa</button>`;
  html += `<button class="size-btn universal" id="sz-universal" onclick="selectUniversal()">🌐 Universal</button>`;
  c.innerHTML = html;
}

function selectSize(l, w) {
  selectedSize = {l, w};
  document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));
  document.getElementById(`sz-${l}-${w}`)?.classList.add("active");
  document.getElementById("custom-size-row").style.display = "none";
  runKroy();
}

function selectCustom() {
  selectedSize = null;
  document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("sz-custom")?.classList.add("active");
  document.getElementById("custom-size-row").style.display = "flex";
}

function selectUniversal() {
  selectedSize = "universal";
  document.querySelectorAll(".size-btn").forEach(b => b.classList.remove("active"));
  document.getElementById("sz-universal")?.classList.add("active");
  document.getElementById("custom-size-row").style.display = "none";
  runKroy();
}

function onCustomChange() {
  const l = parseInt(document.getElementById("custom-l").value)||0;
  const w = parseInt(document.getElementById("custom-w").value)||0;
  if (l>0&&w>0) { selectedSize={l,w}; runKroy(); }
}

function toggleRotate() {
  rotateAll = !rotateAll;
  const tog = document.getElementById("rotate-toggle");
  const hint = document.getElementById("rotate-hint");
  if (rotateAll) { tog.classList.add("on"); hint.textContent="Farqi yo'q"; }
  else           { tog.classList.remove("on"); hint.textContent="Farqi bor"; }
  if (selectedSize) runKroy();
}

async function runKroy() {
  if (!details.length) { showToast("❌ Detallar bo'sh!"); return; }
  if (!selectedSize)   { showToast("List o'lchamini tanlang"); return; }
  if (kroyLoading)     return;

  kroyLoading = true;
  const resultEl = document.getElementById("kroy-result");
  const labelEl  = document.getElementById("result-label");
  resultEl.innerHTML = '<div class="kroy-loading">⏳ Hisoblanmoqda...</div>';
  labelEl.style.display = "block";

  const isUniversal = selectedSize === "universal";
  const body = {
    details: details.map((d,i) => ({...d, _kroy_id:i, material: d.material||"NONAME"})),
    rotate_all: rotateAll,
    universal: isUniversal,
    sheet_l: isUniversal ? 0 : selectedSize.l,
    sheet_w: isUniversal ? 0 : selectedSize.w,
  };

  try {
    const res = await fetch(SERVER + "/kroy", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json().catch(()=>({detail:"Xato"}));
      showToast("❌ " + (err.detail||"Server xatosi"));
      resultEl.innerHTML = "";
      labelEl.style.display = "none";
      return;
    }
    const data = await res.json();
    renderKroyResult(data);
  } catch(e) {
    showToast("❌ Server bilan bog'lanib bo'lmadi");
    resultEl.innerHTML = "";
    labelEl.style.display = "none";
  } finally {
    kroyLoading = false;
  }
}

function renderKroyResult(data) {
  const c = document.getElementById("kroy-result");
  const shL = data.sheet_l, shW = data.sheet_w;
  let html = "";

  for (const [mat, r] of Object.entries(data.results)) {
    html += `<div class="kroy-mat-title">📦 ${mat}</div>`;

    // ── UNIVERSAL rejim ───────────────────────────────────────────────────────
    if (r.universal) {
      html += `<div class="kroy-sheet-card">
        <div class="kroy-sheet-header">
          <div class="kroy-sheet-num">📊 Taqqoslash</div>
        </div>
        <div style="padding:4px 0">`;
      r.sizes.forEach((s, i) => {
        const effCls = s.efficiency >= 70 ? "color:var(--green)" : "color:#ff9f0a";
        const best = i === 0 ? ' style="background:rgba(48,209,88,0.06)"' : '';
        const skipTxt = s.skipped > 0 ? `<span style="color:var(--red);font-size:12px"> (${s.skipped} sig'madi)</span>` : '';
        html += `<div style="display:flex;align-items:center;padding:10px 14px;border-bottom:1px solid var(--sep)"${best}>
          <div style="flex:1;font-size:15px;font-variant-numeric:tabular-nums">${s.l}×${s.w}</div>
          <div style="font-size:14px;font-weight:600;margin-right:12px">${s.count} list${skipTxt}</div>
          <div style="font-size:13px;font-weight:600;${effCls}">${s.efficiency}%</div>
        </div>`;
      });
      html += `</div></div>`;
      continue;
    }

    // ── ODDIY rejim ───────────────────────────────────────────────────────────
    html += `<div class="kroy-summary">
      <div class="kroy-summary-mat">${r.count} ta list</div>
      <div class="kroy-summary-info">O'rtacha: ${r.efficiency}%</div>
    </div>`;

    if (r.not_fit && r.not_fit.length) {
      html += `<div class="not-fit-box">
        <div class="not-fit-title">❌ Sig'madi (${r.not_fit.length} ta):</div>
        ${r.not_fit.map(x=>`<div class="not-fit-item">• ${x.label||JSON.stringify(x)}</div>`).join("")}
      </div>`;
    }

    r.sheets.forEach((sheet, si) => {
      const effCls = sheet.efficiency >= 70 ? "" : "low";
      const svgW = shL > 0 ? Math.min(shL, 320) : 320;
      const scale = shL > 0 ? svgW / shL : 1;
      const svgH = shW > 0 ? Math.round(shW * scale) : 160;

      const colors = ["#0a84ff","#30d158","#ff9f0a","#ff453a","#bf5af2","#5ac8fa","#ffd60a"];
      const labelMap = {};
      sheet.placed.forEach(p => { if (!labelMap[p.label]) labelMap[p.label] = colors[Object.keys(labelMap).length % colors.length]; });

      const rects = sheet.placed.map(p => {
        const x=Math.round(p.x*scale), y=Math.round(p.y*scale);
        const w=Math.max(Math.round(p.w*scale),2), h=Math.max(Math.round(p.h*scale),2);
        const col = labelMap[p.label]||"#888";
        const fs = Math.max(Math.min(w,h)/4, 8);
        return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${col}" fill-opacity="0.7" stroke="${col}" stroke-width="1" rx="2"/>
                <text x="${x+w/2}" y="${y+h/2}" fill="#fff" font-size="${fs}" text-anchor="middle" dominant-baseline="middle" font-family="monospace">${p.label.split('x')[0]}</text>`;
      }).join("");

      html += `<div class="kroy-sheet-card">
        <div class="kroy-sheet-header">
          <div class="kroy-sheet-num">List ${si+1}</div>
          <div class="kroy-sheet-eff ${effCls}">${sheet.efficiency}%</div>
        </div>
        <div class="kroy-svg-wrap">
          <svg width="${svgW}" height="${svgH}" style="background:rgba(255,255,255,0.04);border-radius:6px">
            ${rects}
          </svg>
        </div>
      </div>`;
    });
  }

  c.innerHTML = html || '<div class="empty">Natija yo\'q</div>';
}

// ── SEND DATA ─────────────────────────────────────────────────────────────────
function sendData() {
  closeAllEdits();
  const bad = details.filter(d=>!d.uzun||!d.keng||!d.son);
  if (bad.length) { showToast("❌ Ba'zi detallar noto'g'ri!"); return; }
  if (!details.length) { showToast("❌ Detallar bo'sh!"); return; }

  tip1 = document.getElementById("tip1").value.trim();
  tip2 = document.getElementById("tip2").value.trim();

  const payload = {
    tip1, tip2,
    rotate_all: rotateAll,
    details: details.map(d => ({
      uzun:+d.uzun, keng:+d.keng, son:+d.son,
      uzun1:d.uzun1||"", uzun2:d.uzun2||"",
      keng1:d.keng1||"", keng2:d.keng2||"",
      txt:     rotateAll,
      naim:    d.naim||"",
      povorot: rotateAll ? 1 : 0,
    })),
  };

  if (tg?.sendData) {
    try {
      tg.sendData(JSON.stringify(payload));
      tg.close();
    }
    catch(e) { showToast("❌ Yuborishda xato: "+e.message); }
  } else {
    console.log("sendData:", JSON.stringify(payload, null, 2));
    showToast("✅ (test rejimi)");
  }
}

// ── CUSTOM KEYBOARD ───────────────────────────────────────────────────────────
const KB_FIELDS = ["uzun","keng","son"];
const KB_LABELS = ["Uzun (mm)", "Keng (mm)", "Son"];
let kbActiveRow = -1;
let kbActiveField = 0;
let kbCurrentVal = ""; // joriy kiritilayotgan qiymat

function kbOpen(rowIdx, fieldIdx) {
  kbActiveRow = rowIdx;
  kbActiveField = fieldIdx;
  const f = KB_FIELDS[fieldIdx];
  const el = document.getElementById(`f-${f}-${rowIdx}`);
  const raw = el ? el.value : "";
  // Agar stored qiymat bilan mos va default bo'lsa — bo'sh boshlaymiz
  const stored = details[rowIdx] ? details[rowIdx][f] : 0;
  const defaultVals = { uzun: 0, keng: 0, son: 1 };
  const isDefault = stored === defaultVals[f] && String(stored) === raw;
  kbCurrentVal = isDefault ? "" : raw;
  document.querySelectorAll(".size-field.kb-active").forEach(e => e.classList.remove("kb-active"));
  if (el) el.classList.add("kb-active");
  kbRefreshDisplay();
  document.getElementById("custom-kb").classList.add("visible");
  document.querySelector(".bottom-bar").style.bottom =
    document.getElementById("custom-kb").offsetHeight + "px";
}

function kbClose() {
  if (kbActiveRow >= 0) kbConfirmField();
  kbActiveRow = -1;
  kbCurrentVal = "";
  document.querySelectorAll(".size-field.kb-active").forEach(e => e.classList.remove("kb-active"));
  document.getElementById("custom-kb").classList.remove("visible");
  document.querySelector(".bottom-bar").style.bottom = "";
}

function kbRefreshDisplay() {
  const val = kbCurrentVal;
  document.getElementById("kb-val").textContent = val || "0";
  const res = evalMath(val);
  const orig = parseFloat(val);
  document.getElementById("kb-eval").textContent =
    (res > 0 && res !== orig && val.match(/[\+\-\*\/]/)) ? "= " + res : "";
  const nextBtn = document.getElementById("kb-next-btn");
  nextBtn.textContent = kbActiveField < KB_FIELDS.length - 1 ? "→" : "✓ Nom";
  // Tabs highlight
  [0,1,2].forEach(fi => {
    const t = document.getElementById(`kb-tab-${fi}`);
    if (t) t.classList.toggle("active", fi === kbActiveField);
  });
  // Input field highlight
  document.querySelectorAll(".size-field.kb-active").forEach(e => e.classList.remove("kb-active"));
  const f = KB_FIELDS[kbActiveField];
  const el = document.getElementById(`f-${f}-${kbActiveRow}`);
  if (el) { el.value = val || ""; el.classList.add("kb-active"); }
}

function kbSwitchField(fieldIdx) {
  kbConfirmField();
  kbActiveField = fieldIdx;
  const f = KB_FIELDS[fieldIdx];
  const el = document.getElementById(`f-${f}-${kbActiveRow}`);
  const raw = el ? el.value : "";
  const stored = details[kbActiveRow] ? details[kbActiveRow][f] : 0;
  const defaultVals = { uzun: 0, keng: 0, son: 1 };
  const isDefault = stored === defaultVals[f] && String(stored) === raw;
  kbCurrentVal = isDefault ? "" : raw;
  document.querySelectorAll(".size-field.kb-active").forEach(e => e.classList.remove("kb-active"));
  if (el) el.classList.add("kb-active");
  kbRefreshDisplay();
}

function kbTap(ch) {
  if (ch === "(") {
    if (kbCurrentVal === "" || kbCurrentVal.match(/[\+\-\*\/]$/)) {
      kbCurrentVal += "(";
    } else {
      kbCurrentVal += ")";
    }
  } else {
    kbCurrentVal += ch;
  }
  kbRefreshDisplay();
}

function kbDel() {
  kbCurrentVal = kbCurrentVal.slice(0, -1);
  kbRefreshDisplay();
}

function kbConfirmField() {
  const res = evalMath(kbCurrentVal);
  const f = KB_FIELDS[kbActiveField];
  const el = document.getElementById(`f-${f}-${kbActiveRow}`);
  if (el && res > 0) el.value = res;
  // kbCurrentVal ni o'zgartirmaymiz — keyingi field uchun alohida o'qiladi
}

function kbNext() {
  kbConfirmField();
  if (kbActiveField < KB_FIELDS.length - 1) {
    kbActiveField++;
    // Keyingi fieldning qiymatini yangi o'qiymiz
    const f = KB_FIELDS[kbActiveField];
    const el = document.getElementById(`f-${f}-${kbActiveRow}`);
    const raw = el ? el.value : "";
    const stored = details[kbActiveRow] ? details[kbActiveRow][f] : 0;
    const defaultVals = { uzun: 0, keng: 0, son: 1 };
    const isDefault = stored === defaultVals[f] && String(stored) === raw;
    kbCurrentVal = isDefault ? "" : raw;
    // Highlight yangilash
    document.querySelectorAll(".size-field.kb-active").forEach(e => e.classList.remove("kb-active"));
    if (el) el.classList.add("kb-active");
    kbRefreshDisplay();
  } else {
    const savedRow = kbActiveRow;
    kbClose();
    setTimeout(() => {
      const naimEl = document.getElementById(`f-naim-${savedRow}`);
      if (naimEl) naimEl.focus();
    }, 50);
  }
}

function kbOk() {
  const row = kbActiveRow;
  kbConfirmField();
  kbClose();
  if (row >= 0) saveEdit(row);
}


let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 2500);
}
</script>
